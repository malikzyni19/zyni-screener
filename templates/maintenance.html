<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta http-equiv="refresh" content="60"/>
<title>ZyNi SMC — Under Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#020810;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.stars{position:fixed;inset:0;pointer-events:none}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur,3s) ease-in-out infinite var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:.1;transform:scale(1)}50%{opacity:.7;transform:scale(1.3)}}
.grid{position:fixed;inset:0;background-image:linear-gradient(rgba(34,211,238,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(34,211,238,.025) 1px,transparent 1px);background-size:44px 44px;pointer-events:none}
.glow{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(34,211,238,.06) 0%,transparent 70%);pointer-events:none;animation:pulse 4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}}
.card{position:relative;z-index:10;text-align:center;max-width:500px;padding:0 24px}
.logo{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:#22d3ee;letter-spacing:4px;text-shadow:0 0 24px rgba(34,211,238,.5);margin-bottom:6px}
.logo-sub{font-size:9px;color:#334d66;letter-spacing:3px;text-transform:uppercase;margin-bottom:36px}
.icon-wrap{font-size:72px;margin-bottom:24px;animation:float 3s ease-in-out infinite;display:block}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.title{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;color:#e2e8f0;margin-bottom:16px;letter-spacing:1px}
.message{font-size:14px;color:#64748b;line-height:1.7;margin-bottom:32px;max-width:380px;margin-left:auto;margin-right:auto}
.line{width:60px;height:1px;background:linear-gradient(90deg,transparent,#22d3ee,transparent);margin:24px auto}
.tg-btn{display:inline-flex;align-items:center;gap:8px;background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.25);color:#22d3ee;padding:12px 24px;border-radius:10px;text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;letter-spacing:.5px;transition:all .2s}
.tg-btn:hover{background:rgba(34,211,238,.15);box-shadow:0 0 20px rgba(34,211,238,.25)}
.refresh-note{font-size:10px;color:#1a2e40;margin-top:24px;letter-spacing:1px}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="grid"></div>
<div class="glow"></div>

<div class="card">
  <div class="logo">ZyNi SMC</div>
  <div class="logo-sub">Smart Money Concept Screener</div>

  <span class="icon-wrap">⚡</span>

  <div class="title">Under Maintenance</div>
  <div class="message">{{ message or "We're upgrading the system to serve you better. We'll be back shortly!" }}</div>

  <div class="line"></div>

  <a href="https://t.me/MalikZyNi" target="_blank" class="tg-btn">
    ✈ Check Telegram for Updates
  </a>

  <div class="refresh-note">This page refreshes automatically every 60 seconds</div>
</div>

<script>
(function(){
  var stars = document.getElementById('stars');
  for(var i=0;i<80;i++){
    var s=document.createElement('div');
    s.className='star';
    var size=Math.random()*2+1;
    s.style.cssText='width:'+size+'px;height:'+size+'px;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;--dur:'+(Math.random()*4+2)+'s;--delay:'+(Math.random()*4)+'s';
    stars.appendChild(s);
  }
})();
</script>
</body>
</html>
