<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ZyNi SMC — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Inter',system-ui,sans-serif;
  background:#04070e;
  color:#e2e8f0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
}

/* Grid background */
.grid-bg{
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(34,211,238,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(34,211,238,.04) 1px, transparent 1px);
  background-size:40px 40px;
  pointer-events:none;z-index:0;
}

/* Corner glows */
.glow-tl{position:fixed;top:-120px;left:-120px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(34,211,238,.12) 0%,transparent 70%);pointer-events:none;z-index:0}
.glow-br{position:fixed;bottom:-100px;right:-100px;width:350px;height:350px;border-radius:50%;background:radial-gradient(circle,rgba(8,145,178,.1) 0%,transparent 70%);pointer-events:none;z-index:0}

/* Flash overlay — white burst on unlock */
.flash-overlay{
  position:fixed;inset:0;
  background:rgba(34,211,238,0);
  pointer-events:none;z-index:999;
  transition:background .15s ease;
}
.flash-overlay.active{background:rgba(34,211,238,.18)}

.login-wrap{
  width:100%;max-width:370px;padding:24px;
  position:relative;z-index:1;
}

/* ── Logo ── */
.logo{text-align:center;margin-bottom:32px}
.logo-top{display:flex;align-items:flex-end;justify-content:center;gap:7px;margin-bottom:12px;height:54px;overflow:visible}
.live-dot{width:10px;height:10px;border-radius:50%;background:#22c55e;box-shadow:0 0 10px #22c55e,0 0 20px rgba(34,197,94,.4);flex-shrink:0;margin-bottom:10px;animation:pulseDot 2s infinite}
@keyframes pulseDot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.75)}}

.zyni-wrap{display:inline-flex;align-items:flex-end;gap:1px;overflow:visible}
.zl{display:inline-block;font-size:32px;font-weight:700;color:#22d3ee;font-family:'JetBrains Mono',monospace;text-shadow:0 0 20px rgba(34,211,238,.7),0 0 40px rgba(34,211,238,.3);line-height:1;will-change:transform}
.logo-rest{font-size:21px;font-weight:700;color:#22d3ee;font-family:'JetBrains Mono',monospace;letter-spacing:3px;opacity:.75;margin-bottom:2px}
.logo-sub{font-size:10px;color:#2a3d52;letter-spacing:3.5px;margin-top:8px;font-family:'Inter',system-ui,sans-serif;font-weight:500}
.glow-line{width:60px;height:2px;background:linear-gradient(90deg,transparent,#22d3ee,transparent);margin:12px auto 0;border-radius:2px;animation:glowPulse 2.5s ease-in-out infinite}
@keyframes glowPulse{0%,100%{opacity:.25;width:30px}50%{opacity:1;width:100px}}

/* ── Card ── */
.card{
  background:linear-gradient(145deg,#080f1d 0%,#060c18 100%);
  border:1px solid #1a3045;
  border-radius:20px;
  padding:28px;
  animation:slideUp .45s cubic-bezier(.22,1,.36,1) .08s forwards;
  opacity:0;transform:translateY(18px);
  box-shadow:
    0 0 0 1px rgba(34,211,238,.06),
    0 8px 40px rgba(0,0,0,.6),
    0 0 60px rgba(34,211,238,.04);
  position:relative;
}
/* Top edge highlight */
.card::before{
  content:'';
  position:absolute;top:0;left:24px;right:24px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(34,211,238,.35),transparent);
  border-radius:2px;
}
@keyframes slideUp{to{opacity:1;transform:translateY(0)}}

.card-title{
  font-size:11px;color:#3d5570;letter-spacing:2px;
  margin-bottom:24px;text-align:center;
  font-family:'Inter',system-ui,sans-serif;font-weight:600;
  text-transform:uppercase;
}

/* ── Field ── */
.field{margin-bottom:18px}
.field label{
  display:block;font-size:10.5px;color:#3d5570;
  letter-spacing:1px;text-transform:uppercase;
  margin-bottom:8px;font-family:'Inter',system-ui,sans-serif;font-weight:600;
}
.field input{
  width:100%;background:#040911;color:#e2e8f0;
  border:1px solid #152435;border-radius:10px;
  padding:13px 14px;font-family:'JetBrains Mono',monospace;
  font-size:15px;outline:none;
  transition:border-color .2s,box-shadow .2s;
  letter-spacing:3px;
}
.field input:focus{
  border-color:#22d3ee50;
  box-shadow:0 0 0 3px rgba(34,211,238,.07),0 0 20px rgba(34,211,238,.05);
}

/* ── Unlock button ── */
.btn{
  width:100%;
  background:linear-gradient(135deg,#0891b2 0%,#06b6d4 100%);
  color:#fff;border:none;padding:14px;
  border-radius:10px;cursor:pointer;
  font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;letter-spacing:1.2px;
  transition:all .2s;
  box-shadow:0 0 24px rgba(8,145,178,.5),0 0 0 1px rgba(34,211,238,.15),0 4px 16px rgba(0,0,0,.4);
  margin-top:4px;position:relative;overflow:hidden;
}
.btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.1),transparent);
  pointer-events:none;
}
.btn:hover{
  box-shadow:0 0 36px rgba(8,145,178,.7),0 0 0 1px rgba(34,211,238,.3),0 4px 20px rgba(0,0,0,.5);
  transform:translateY(-1px);
}
.btn:active{transform:translateY(0)}
.btn.unlocking{
  pointer-events:none;
  background:linear-gradient(135deg,#16a34a 0%,#22c55e 100%);
  box-shadow:0 0 40px rgba(34,197,94,.7),0 0 0 1px rgba(34,197,94,.3),0 0 80px rgba(34,197,94,.2);
  letter-spacing:2px;
}

/* ── Error ── */
.error{
  background:rgba(127,29,29,.3);border:1px solid #7f1d1d80;
  color:#f87171;border-radius:8px;padding:10px 12px;
  font-size:11px;margin-bottom:16px;text-align:center;
  font-family:'Inter',system-ui,sans-serif;
}

.footer{text-align:center;margin-top:20px;font-size:10px;color:#152030;letter-spacing:1.5px;font-family:'Inter',system-ui,sans-serif}

/* ── Fly-out animation ── */
@keyframes unlockCard{
  0%{opacity:1;transform:translateY(0) scale(1)}
  40%{opacity:1;transform:translateY(-6px) scale(1.015)}
  100%{opacity:0;transform:translateY(-50px) scale(.95)}
}
.card.fly-out{animation:unlockCard .55s cubic-bezier(.4,0,.2,1) forwards!important}

/* FIX 3 — ZyNi zoom animation */
@keyframes zyniZoom{
  0%{transform:scale(1);opacity:1;text-shadow:0 0 30px rgba(34,211,238,.8),0 0 60px rgba(34,211,238,.4)}
  50%{transform:scale(3.5);opacity:1;text-shadow:0 0 60px rgba(34,211,238,1),0 0 120px rgba(34,211,238,.6)}
  100%{transform:scale(14);opacity:0;text-shadow:0 0 100px rgba(34,211,238,.5),0 0 200px rgba(34,211,238,.2)}
}
@keyframes bgPulse{
  0%{transform:scale(1);opacity:.8}
  100%{transform:scale(10);opacity:0}
}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="glow-tl"></div>
<div class="glow-br"></div>
<div class="flash-overlay" id="flashOverlay"></div>

<div class="login-wrap">
  <div class="logo">
    <div class="logo-top">
      <div class="live-dot"></div>
      <div class="zyni-wrap">
        <span class="zl" id="lZ">Z</span><span class="zl" id="lY">y</span><span class="zl" id="lN">N</span><span class="zl" id="lI">i</span>
      </div>
      <div class="logo-rest">SMC</div>
    </div>
    <div class="logo-sub">SMART MONEY SCREENER</div>
    <div class="glow-line"></div>
  </div>

  <div class="card" id="loginCard">
    <div class="card-title">ENTER PASSWORD TO ACCESS</div>
    <div id="errBox" class="error" style="display:none"></div>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form id="loginForm" method="POST">
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" id="pwInput" placeholder="••••••••" autofocus autocomplete="current-password" />
      </div>
      <button type="submit" class="btn" id="unlockBtn">UNLOCK →</button>
    </form>
  </div>
  <div class="footer">PRIVATE ACCESS ONLY</div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e){
  e.preventDefault();
  var btn = document.getElementById('unlockBtn');
  var pw = document.getElementById('pwInput').value;
  var errBox = document.getElementById('errBox');
  btn.textContent = 'VERIFYING...';
  btn.disabled = true;
  errBox.style.display = 'none';

  var fd = new FormData();
  fd.append('password', pw);

  fetch('/login', {method:'POST', body: fd, redirect:'manual'})
    .then(function(r){
      if(r.type === 'opaqueredirect' || r.status === 0 || r.status === 302 || (r.ok && r.url && !r.url.includes('/login'))){
        unlockSequence();
      } else {
        return r.text().then(function(html){
          var hasError = html.indexOf('error') !== -1 || html.indexOf('invalid') !== -1 || html.indexOf('wrong') !== -1 || html.indexOf('incorrect') !== -1;
          if(hasError || r.status === 200){
            btn.textContent = 'UNLOCK →';
            btn.disabled = false;
            errBox.textContent = 'Invalid password. Try again.';
            errBox.style.display = 'block';
          } else {
            unlockSequence();
          }
        });
      }
    })
    .catch(function(){ unlockSequence(); });
});

function unlockSequence(){
  var btn = document.getElementById('unlockBtn');
  var flash = document.getElementById('flashOverlay');
  var loginWrap = document.querySelector('.login-wrap');

  btn.textContent = '✓  UNLOCKED';
  btn.classList.add('unlocking');

  // Flash
  setTimeout(function(){ flash.classList.add('active'); }, 80);
  setTimeout(function(){ flash.classList.remove('active'); }, 280);

  // Fade out login wrap
  setTimeout(function(){
    loginWrap.style.transition = 'opacity 0.35s ease';
    loginWrap.style.opacity = '0';
  }, 250);

  // Show ZyNi zoom overlay
  setTimeout(function(){
    var overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:#04070e;';

    var pulse = document.createElement('div');
    pulse.style.cssText = 'position:absolute;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(34,211,238,.3),transparent 70%);animation:bgPulse 1.1s ease-out forwards;';

    var text = document.createElement('div');
    text.innerHTML = '<span style="color:#22d3ee">Z</span><span style="color:#22d3ee">y</span><span style="color:#22d3ee">N</span><span style="color:#22d3ee">i</span>';
    text.style.cssText = 'font-family:\'JetBrains Mono\',monospace;font-size:68px;font-weight:800;text-shadow:0 0 30px rgba(34,211,238,.8),0 0 60px rgba(34,211,238,.4);animation:zyniZoom 1.3s cubic-bezier(.4,0,.2,1) forwards;letter-spacing:10px;position:relative;';

    overlay.appendChild(pulse);
    overlay.appendChild(text);
    document.body.appendChild(overlay);
  }, 380);

  // Redirect after animation
  setTimeout(function(){
    window.location.href = '/';
  }, 1700);
}

// ZyNi letter bounce
(function(){
  var letters = [document.getElementById('lZ'),document.getElementById('lY'),document.getElementById('lN'),document.getElementById('lI')];
  var JUMP=28,DURATION=360,GAP=150,idx=0,startTime=null;
  function animateLetter(el,ts){
    if(startTime===null) startTime=ts;
    var p=Math.min((ts-startTime)/DURATION,1);
    var y=-JUMP*Math.sin(Math.PI*p);
    el.style.transform='translateY('+y.toFixed(2)+'px)';
    var s=Math.round(20+p*35);
    el.style.textShadow='0 0 '+s+'px rgba(34,211,238,'+(0.7+p*0.3).toFixed(2)+'),0 0 '+(s*2)+'px rgba(34,211,238,.2)';
    if(p<1){requestAnimationFrame(function(t){animateLetter(el,t)});}
    else{el.style.transform='translateY(0px)';el.style.textShadow='0 0 20px rgba(34,211,238,.7),0 0 40px rgba(34,211,238,.3)';idx=(idx+1)%letters.length;startTime=null;setTimeout(next,GAP);}
  }
  function next(){requestAnimationFrame(function(ts){animateLetter(letters[idx],ts)});}
  next();
})();
</script>
</body>
</html>
